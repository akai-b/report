		<meta charset="utf-8" />

		<style>
			:root {
				--bg: #f5f7fb;
				--card: #ffffff;
				--text: #172033;
				--muted: #697386;
				--line: #e6eaf2;
				--blue: #326bff;
				--cyan: #00a6c8;
				--shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
				--radius: 18px;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
				background: var(--bg);
				color: var(--text);
			}
			.page {
				width: min(1440px, 100%);
				margin: 0 auto;
				padding: 24px;
			}
			.hero {
				display: flex;
				justify-content: space-between;
				gap: 16px;
				align-items: flex-end;
				margin-bottom: 18px;
			}
			.hero h1 {
				margin: 0 0 8px;
				font-size: 30px;
				letter-spacing: 0.2px;
			}
			.hero p {
				margin: 0;
				color: var(--muted);
				line-height: 1.7;
			}
			.badge {
				white-space: nowrap;
				color: #fff;
				background: linear-gradient(135deg, var(--blue), var(--cyan));
				padding: 10px 14px;
				border-radius: 999px;
				font-size: 13px;
				box-shadow: var(--shadow);
			}
			.kpi-grid {
				display: grid;
				grid-template-columns: repeat(4, 1fr);
				gap: 14px;
				margin-bottom: 16px;
			}
			.kpi {
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: var(--radius);
				padding: 18px;
				box-shadow: var(--shadow);
			}
			.kpi .label {
				color: var(--muted);
				font-size: 13px;
				margin-bottom: 10px;
			}
			.kpi .value {
				font-size: 25px;
				font-weight: 800;
				word-break: break-all;
			}
			.card {
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: var(--radius);
				padding: 18px;
				box-shadow: var(--shadow);
				min-width: 0;
			}
			.card-title {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				margin-bottom: 12px;
			}
			.card-title h2 {
				margin: 0;
				font-size: 18px;
			}
			.card-title span {
				color: var(--muted);
				font-size: 12px;
			}
			.tabs {
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
				margin-bottom: 12px;
			}
			.tab {
				border: 1px solid var(--line);
				background: #fff;
				color: #475569;
				padding: 8px 12px;
				border-radius: 999px;
				cursor: pointer;
			}
			.tab.active {
				background: #172033;
				color: #fff;
				border-color: #172033;
			}
			.table-wrap {
				width: 100%;
				overflow: auto;
				border: 1px solid var(--line);
				border-radius: 14px;
			}
			table {
				width: 100%;
				min-width: 860px;
				border-collapse: collapse;
				font-size: 13px;
				background: #fff;
			}
			th,
			td {
				padding: 11px 12px;
				border-bottom: 1px solid var(--line);
				text-align: right;
				white-space: nowrap;
			}
			th:first-child,
			td:first-child {
				text-align: left;
			}
			th {
				position: sticky;
				top: 0;
				z-index: 1;
				background: #f8fafc;
				color: #475569;
				cursor: pointer;
				user-select: none;
				font-weight: 700;
			}
			tr:hover td {
				background: #fafcff;
			}
			.amount {
				font-weight: 700;
				color: #172033;
			}
			.link {
				color: #326bff;
				text-decoration: none;
			}
			@media (max-width: 960px) {
				.page {
					padding: 16px;
				}
				.hero {
					align-items: flex-start;
					flex-direction: column;
				}
				.kpi-grid {
					grid-template-columns: repeat(2, 1fr);
				}
			}
			@media (max-width: 560px) {
				.page {
					padding: 12px;
				}
				.kpi-grid {
					grid-template-columns: 1fr;
				}
				.card {
					border-radius: 14px;
					padding: 14px;
				}
				table {
					font-size: 12px;
					min-width: 760px;
				}
				th,
				td {
					padding: 9px 10px;
				}
			}
		</style>
	</head>

				}
				const keys = Object.keys(rows[0])
				rows.sort((a, b) => {
					const av = a[sortState.key],
						bv = b[sortState.key]
					if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortState.dir
					return String(av ?? '').localeCompare(String(bv ?? ''), 'zh-CN') * sortState.dir
				})
				const html = `<table><thead><tr>${keys.map((k) => `<th data-key="${k}">${k} ${sortState.key === k ? (sortState.dir > 0 ? '▲' : '▼') : ''}</th>`).join('')}</tr></thead><tbody>${rows
					.map(
						(r) =>
							`<tr>${keys
								.map((k) => {
									const v = r[k]
									const text = typeof v === 'number' ? (k === '订单数' ? fmtInt(v) : fmtNumber(v)) : (v ?? '')
									const cls = isMoneyKey(k) ? ' class="amount"' : ''
									return `<td${cls}>${text}</td>`
								})
								.join('')}</tr>`
					)
					.join('')}</tbody></table>`
				document.getElementById('tableWrap').innerHTML = html
				document.querySelectorAll('th[data-key]').forEach((th) => {
					th.addEventListener('click', () => {
						const key = th.dataset.key
						sortState = sortState.key === key ? { key, dir: -sortState.dir } : { key, dir: -1 }
						renderTable(currentTable)
					})
				})
			}
			function bindTabs() {
				document.querySelectorAll('.tab').forEach((btn) => {
					btn.addEventListener('click', () => {
						document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'))
						btn.classList.add('active')
						sortState = { key: '销售额', dir: -1 }
						renderTable(btn.dataset.table)
					})
				})
			}
			bindTabs()
			renderTable('productTable')
		</script>
	</body>
</html>
